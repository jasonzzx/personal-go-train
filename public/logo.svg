<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c3a5e"/>
      <stop offset="100%" stop-color="#0b1c2e"/>
    </linearGradient>
    <linearGradient id="frost" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eafcff"/>
      <stop offset="35%" stop-color="#7fe7ff"/>
      <stop offset="60%" stop-color="#34a9e0"/>
      <stop offset="100%" stop-color="#1166b0"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect width="100" height="100" rx="22.4" ry="22.4"/>
    </clipPath>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="100" height="100" rx="22.4" ry="22.4" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22.4" ry="22.4" fill="url(#frost)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <circle cx="84" cy="18" r="5.5" fill="#34D399"/>
  <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
        font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-size="50" font-weight="900" fill="url(#chrome)"
        stroke="rgba(255,255,255,0.5)" stroke-width="0.6"
        filter="url(#sh)" letter-spacing="-3">GO</text>
</svg>
